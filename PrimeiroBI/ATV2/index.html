<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Atividade 2 - Formulário</title>
</head>
<body> 

    <header>
        <h1>Página de Cadastro</h1>
    </header>

   <main>
        <form action="/perfil" method="post">

            <fieldset>
               <legend>Crie sua Conta</legend>

                <div>
                    <label for="nome">Nome:</label><br>
                    <input type="text" id="nome" name="user_nome" required>
                </div>

                <div>
                    <br><label for="email">E-mail:</label><br>
                    <input 
                        type="email"    
                        id="email" 
                        name="user_email" 
                        placeholder="seuemail@dominio.com" 
                        required
                    >    
                </div>

                <div>
                    <br><label for="senha">Senha (mínimo 8 caracteres):</label><br>
                    <input type="password" id="senha" name="user_senha" minlength="8" required>
                </div>
  
                <div> 
                    <h4><br><strong>Gênero:</strong></h4>

                    <input type="radio" id="feminino" name="genero" value="feminino" required>
                    <label for="feminino">Feminino</label><br>

                    <input type="radio" id="masculino" name="genero" value="masculino">
                    <label for="masculino">Masculino</label><br>  
                
                    <input type="radio" id="outro" name="genero" value="outro">
                    <label for="outro">Outro</label>
                </div>
                        
                <div>
                    <br><label for="biografia">Biografia:</label><br>
                    <textarea 
                        name="biografia" 
                        id="biografia"
                        placeholder="Fale um pouco sobre você..." 
                        rows="5"
                    ></textarea>
                </div>

                <div>
                    <br><input type="checkbox" id="termos" name="termos" required> 
                    <label for="termos">Eu li e aceito os termos de serviço.</label>
                </div>
    
            </fieldset>

            <div>
                <br><button type="submit">Cadastrar</button>
                <button type="reset">Limpar</button>
            </div>

        </form>
    </main>

</body>
</html>
